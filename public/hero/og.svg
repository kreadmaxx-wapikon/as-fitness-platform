<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#050507"/>
      <stop offset="0.55" stop-color="#0b0b10"/>
      <stop offset="1" stop-color="#050507"/>
    </linearGradient>
    <linearGradient id="neon" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ff2d2d"/>
      <stop offset="0.55" stop-color="#ff7a18"/>
      <stop offset="1" stop-color="#ffb703"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <g opacity="0.9">
    <circle cx="180" cy="120" r="180" fill="#ff2d2d" opacity="0.18"/>
    <circle cx="980" cy="80" r="190" fill="#ff7a18" opacity="0.16"/>
    <circle cx="650" cy="570" r="220" fill="#ffb703" opacity="0.10"/>
  </g>
  <rect x="70" y="70" width="1060" height="490" rx="44" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.10)"/>
  <g filter="url(#glow)">
    <path d="M200 420c80-160 160-220 260-140 70 56 160 64 240-20 75-79 155-80 250 10v170H200Z" fill="rgba(255,45,45,0.12)" stroke="url(#neon)" stroke-width="6" />
  </g>
  <text x="130" y="250" font-family="Arial, Helvetica, sans-serif" font-size="52" font-weight="900" fill="url(#neon)">
    AS-Fitness
  </text>
  <text x="130" y="330" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700" fill="#e5e7eb" opacity="0.95">
    Transform Your Body, Transform Your Life
  </text>
</svg>

